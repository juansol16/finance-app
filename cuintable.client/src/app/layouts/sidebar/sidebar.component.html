<div class="flex flex-col h-full">
    <!-- Logo -->
    <div class="px-5 py-6">
        <a routerLink="/dashboard" class="flex items-center gap-3 group">
            <div class="w-11 h-11 rounded-2xl gradient-primary flex items-center justify-center shadow-lg shadow-blue-500/30 hover-wiggle">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24">
                    <circle cx="11" cy="12" r="7.3" stroke="white" stroke-width="2" />
                    <path d="M11 8.4v7.2M9.2 10c0-.9.8-1.5 1.8-1.5s1.8.5 1.8 1.4-.8 1.3-1.8 1.4-1.8.5-1.8 1.4.8 1.4 1.8 1.4 1.8-.6 1.8-1.5"
                          stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M19 3.6l.62 1.68L21.3 5.9l-1.68.62L19 8.2l-.62-1.68L16.7 5.9l1.68-.62z" fill="#bae6fd" />
                </svg>
            </div>
            <div>
                <span class="text-xl font-extrabold text-white tracking-tight">Cuintable</span>
                <span class="block text-[10px] font-bold uppercase tracking-[0.2em] text-gradient-primary">Fiscal · RESICO</span>
            </div>
        </a>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-3 mt-2 space-y-1">
        <a *ngFor="let item of visibleMenuItems" [routerLink]="item.route" class="sidebar-nav-item"
            [class.active]="isActive(item.route)">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="item.icon" />
            </svg>
            <span>{{ item.label | translate }}</span>
        </a>
    </nav>

    <!-- Invite User Button -->
    <div *ngIf="canInvite" class="px-3 mb-2">
        <button class="sidebar-nav-item w-full" (click)="showInviteForm = true">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
            </svg>
            <span>{{ 'INVITE.BUTTON' | translate }}</span>
        </button>
    </div>

    <app-invite-user-form *ngIf="showInviteForm" (closed)="showInviteForm = false"></app-invite-user-form>

    <!-- User Section -->
    <div class="px-3 pb-4 mt-auto">
        <div class="border-t border-white/[0.06] pt-4">
            <div class="flex items-center gap-3 px-2">
                <div
                    class="w-9 h-9 rounded-full gradient-primary flex items-center justify-center text-white font-semibold text-sm">
                    {{ (authService.user?.fullName || 'U') | slice:0:1 }}
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-white truncate">{{ authService.user?.fullName || 'User' }}</p>
                    <p class="text-xs text-slate-500 truncate">{{ authService.user?.email || '' }}</p>
                </div>
                <button
                    class="p-1.5 rounded-lg hover:bg-white/[0.06] text-slate-500 hover:text-red-400 transition-colors"
                    (click)="authService.logout()" title="Logout">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>
